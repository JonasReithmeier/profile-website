<!-- html language is NOT upper/lower case sensitive -->
<!--css code can be directly integrated into html code inside of <style> </(style>, but for segmentation it should NOT be done (at least in the past)
 instead create seperate css file with/ modern performance integration tnto html file with astro -->

    <!-- linking html to css file -->
    <link rel="stylesheet" href="css/styles.css" />
    <!--all metadata is supposed to be in the header. Here to avoid website rendering before the css file has been read-->
  </head>
