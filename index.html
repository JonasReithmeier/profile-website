<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Essential for mobile-friendly sites -->
    <title>Jonas Reithmeier</title>
    <link rel="icon" type="image/jpeg" href="assets/icons/head.jpeg" />
    <!--keine website inhalt sondern der website icon => handling mit link, nicht img-->

    <!-- linking html to css file -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main>
      <section id="hero">
        <div>
          <img
            src="assets/images/CloseUpLinkedInJonasR.jpg"
            class="profile-pic"
          />
          <h1>Hey, my name is Jonas Reithmeier.</h1>
          <p>I am a <span>physics student</span> based in Munich, Germany.</p>
        </div>
      </section>

      <section id="contact">
        <!-- Geschützte Links (wie zuvor) -->
        <div class="contact-area">
          <a
            href="#"
            class="protected-link"
            data-type="email"
            data-encoded="am9uYXNyZWl0aG1laWVyQG91dGxvb2suZGU="
          >
            <svg class="icon"><use href="#icon-email"></use></svg>
            <span class="label">Contact data hidden</span>
          </a>
        </div>

        <!-- Das DIY-Captcha UI -->
        <div id="captcha-box" class="captcha-container">
          <p id="captcha-status">Security check required</p>
          <div class="progress-bar"><div id="progress-fill"></div></div>
          <button id="start-captcha">
            Click here to start friendly captcha
          </button>
        </div>

        <script src="js/captcha.js" defer></script>
      </section>
    </main>
  </body>
</html>
